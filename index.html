function getWeeklyTargets(splitKey, customDays=[]) {
  const t = {}; MUSCLE_GROUPS.forEach(g => t[g] = 0);
  const days = splitKey === 'custom' ? customDays : (SPLITS[splitKey]?.days || []);
  days.forEach(d => [...(d.main||[]), ...(d.other||[])].forEach(id => {
    const ex = exerciseById(id); if (ex.group) t[ex.group]++;
  }));
  return t;
}

<script type="text/babel">
function RingStack({ progress, targets, size=260, strokeWidth=9, gap=3 }) {
  const center = size / 2, outerR = center - strokeWidth / 2 - 2;
  const total = Object.values(targets).reduce((a,b)=>a+b,0) || 1;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ display:"block" }}>
      {MUSCLE_GROUPS.map((g,i) => {
        const r = outerR - i*(strokeWidth+gap);
        const c = 2*Math.PI*r;
        const done = Math.min(1, (progress[g]||0) / Math.max(1, targets[g]||1));
        return (
          <g key={g}>
            <circle cx={center} cy={center} r={r} fill="none" stroke="currentColor" strokeOpacity="0.08" strokeWidth={strokeWidth}/>
            <circle cx={center} cy={center} r={r} fill="none" stroke={MG_COLORS[g]} strokeWidth={strokeWidth} strokeLinecap="round"
              strokeDasharray={`${c*done} ${c}`} transform={`rotate(-90 ${center} ${center})`}
              style={{ transition:"stroke-dasharray 700ms cubic-bezier(.2,.8,.2,1)" }}/>
          </g>
        );
      })}
    </svg>
  );
}

function GroupKey({ progress, targets }) {
  return (
    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:"6px 14px", fontFamily:"var(--font-mono)", fontSize:10.5, letterSpacing:0.06, textTransform:"uppercase" }}>
      {MUSCLE_GROUPS.map(g => (
        <div key={g} style={{ display:"flex", alignItems:"center", gap:6, color:"var(--ink-60)" }}>
          <span style={{ width:6, height:6, borderRadius:999, background:MG_COLORS[g], flexShrink:0 }}/>
          <span style={{ flex:1, color:"var(--ink)" }}>{MG_LABEL[g]}</span>
          <span style={{ fontVariantNumeric:"tabular-nums" }}>{progress[g]||0}<span style={{ opacity:0.5 }}>/{targets[g]||0}</span></span>
        </div>
      ))}
    </div>
  );
}

const REPS_GUIDE = { legs:"6-10", back:"8-12", chest:"8-12", arms:"10-15", shoulders:"10-15", abs:"15-20" };
const SETS_MAIN = 4, SETS_ACC = 3;
const { useState: useStateComp } = React;

function ExerciseRow({ ex, checked, onToggle, dashed=false, isMain=false, setsDone=0, setsTarget=3, onSetAdd, onRemove, detailedMode=false, detailedEntries=[], onAddSetEntry, onEditSetEntry, onDeleteSetEntry }) {
  const [repInput, setRepInput] = useStateComp("");
  const [kgInput, setKgInput] = useStateComp("");
  const [editingIndex, setEditingIndex] = useStateComp(null);
  const reps = REPS_GUIDE[ex.group] || "8-12";
  const startEdit = (i, e) => { setEditingIndex(i); setRepInput(String(e.reps)); setKgInput(String(e.kg)); };
  const cancelEdit = () => { setEditingIndex(null); setRepInput(""); setKgInput(""); };
  const handleOk = () => {
    const r = parseInt(editingIndex !== null ? repInput : (repInput || reps.split('-')[0]));
    const k = parseFloat(kgInput.replace(',', '.'));
    if (!r || isNaN(r) || isNaN(k) || k <= 0) return;
    if (editingIndex !== null) {
      onEditSetEntry && onEditSetEntry(editingIndex, { reps:r, kg:k });
      cancelEdit();
    } else {
      onAddSetEntry && onAddSetEntry({ reps:r, kg:k });
      setKgInput("");
    }
    if (checked) onToggle && onToggle();
  };
  return (
    <div style={{ borderTop: dashed ? "1px dashed var(--rule)" : "1px solid var(--rule)", padding:"11px 0 8px" }}>
      <div style={{ display:"flex", alignItems:"center", gap:12 }}>
        <button onClick={onToggle} style={{
          width:22, height:22, borderRadius:5, flexShrink:0, transition:"all 180ms", cursor:"pointer",
          border: checked ? "none" : `1.5px solid ${isMain ? MG_COLORS[ex.group] : "var(--ink-30)"}`,
          background: checked ? MG_COLORS[ex.group] : "transparent",
          display:"flex", alignItems:"center", justifyContent:"center",
        }}>
          {checked && <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6.5l2.5 2.5L10 3.5" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
        </button>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{
            fontFamily:"var(--font-display)", fontSize: isMain ? 20 : 17, letterSpacing:-0.2,
            color: checked ? "var(--ink-60)" : "var(--ink)",
            textDecoration: checked ? "line-through" : "none", textDecorationThickness:"1px", lineHeight:1.1,
          }}>{ex.name}</div>
          <div style={{ fontFamily:"var(--font-mono)", fontSize:9.5, letterSpacing:0.08, color:"var(--ink-60)", textTransform:"uppercase", marginTop:2, display:"flex", gap:8, alignItems:"center" }}>
            <span style={{ color:MG_COLORS[ex.group] }}>◆ {MG_LABEL[ex.group]}</span>
            {isMain && <span style={{ color:"var(--ink-30)" }}>· MAIN</span>}
            {dashed && <span style={{ color:"var(--ink-30)" }}>· ADDED</span>}
          </div>
        </div>
        {onRemove && (
          <button onClick={onRemove} title="Remove" style={{ width:22, height:22, background:"transparent", border:"1px solid var(--rule)", color:"var(--ink-60)", cursor:"pointer", fontFamily:"var(--font-mono)", fontSize:12, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>×</button>
        )}
      </div>
      {detailedMode && onAddSetEntry && (
        <div style={{ marginTop:10, paddingLeft:34 }}>
          {detailedEntries.map((e, i) => {
            const isEditing = editingIndex === i;
            return (

function DayCard({ day, plan, dayColor, completed, total, isCurrent, isDone, onClick, onRemove }) {
  const pct = total ? completed/total : 0;
  const subtitle = (plan.main && plan.main.length > 0) ? plan.main.map(id=>exerciseById(id).name).join(" · ") : (plan.sub || "");
  const bg = isCurrent ? "var(--ink)" : isDone ? "oklch(0.72 0.16 55)" : "transparent";
  const fg = (isCurrent || isDone) ? (isDone ? "oklch(0.18 0.04 55)" : "var(--paper)") : "var(--ink)";

  const borderCol = isCurrent ? "var(--ink)" : isDone ? "oklch(0.62 0.18 55)" : "var(--rule)";
  return (

          {onRemove && <span onClick={e=>{e.stopPropagation();onRemove();}} style={{ width:18,height:18,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"var(--font-mono)",fontSize:13,color:fgMuted,background:"rgba(128,128,128,0.2)",borderRadius:2,cursor:"pointer",flexShrink:0 }}>×</span>}

        <div style={{ position:"absolute", left:0, top:0, bottom:0, width:`${pct*100}%`, background: isDone ? "oklch(0.18 0.04 55)" : isCurrent ? "var(--paper)" : "var(--accent)", transition:"width 400ms ease" }}/>

    </button>
  );
}

Object.assign(window, { RingStack, GroupKey, ExerciseRow, Rule, DayCard });
</script>

// ── Dashboard ──
function Dashboard({ state, dispatch, navigate, setShowPaywall }) {
  const { activeSplit, completions, completedDays, customPlan, detailedMode, extraDays={} } = state;
  const isCustom = activeSplit === 'custom';
  const splitData = isCustom ? customPlan : SPLITS[activeSplit];
  const splitCompletions = completions[activeSplit] || [];
  const splitCompletedDays = completedDays[activeSplit] || [];
  const progress = computeProgress(splitCompletions);
  const targets = getWeeklyTargets(activeSplit, customPlan?.days || []);
  const totalDone = Object.values(progress).reduce((a,b)=>a+b,0);
  const totalTarget = Object.values(targets).reduce((a,b)=>a+b,0);
  const today = new Date();
  const weekday = ["SUN","MON","TUE","WED","THU","FRI","SAT"][today.getDay()];
  const dateStr = `${weekday} · ${today.toLocaleDateString("en-US",{month:"short",day:"numeric"}).toUpperCase()}`;
  const hasExtraDay = !isCustom && extraDays[activeSplit]?.enabled;
  const totalDays = splitData.days.length + (hasExtraDay ? 1 : 0);
  let currentDay = totalDays;
  for (let i=0; i<splitData.days.length; i++) {
    if (!splitCompletedDays.includes(i+1)) { currentDay = i+1; break; }
  }
  if (currentDay > splitData.days.length && hasExtraDay && !splitCompletedDays.includes(totalDays)) currentDay = totalDays;

  return (
    <div style={{ padding:"8px 24px 100px", fontFamily:"var(--font-body)", color:"var(--ink)" }}>

          <div style={{ fontFamily:"var(--font-display)", fontSize:42, lineHeight:0.95, letterSpacing:-0.035, marginTop:10, fontWeight:400 }}>
            <span style={{ fontStyle:"italic" }}>Training</span> Log
          </div>
        </div>
        <div style={{ display:"flex", gap:8, paddingTop:6 }}>
          <button onClick={() => dispatch({ type:"TOGGLE_THEME" })} title={state.theme==='ink'?"Light mode":"Dark mode"}
            style={{ width:36, height:36, background:"transparent", border:"1px solid var(--rule)", cursor:"pointer", color:"var(--ink-60)", display:"flex", alignItems:"center", justifyContent:"center" }}>
            {state.theme==='ink'
              ? <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="3" fill="currentColor"/><line x1="8" y1="1.5" x2="8" y2="3" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/><line x1="8" y1="13" x2="8" y2="14.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/><line x1="1.5" y1="8" x2="3" y2="8" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/><line x1="13" y1="8" x2="14.5" y2="8" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/><line x1="3.4" y1="3.4" x2="4.4" y2="4.4" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/><line x1="11.6" y1="11.6" x2="12.6" y2="12.6" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/><line x1="3.4" y1="12.6" x2="4.4" y2="11.6" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/><line x1="11.6" y1="4.4" x2="12.6" y2="3.4" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>
              : <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M13.5 9.5A6 6 0 0 1 6.5 2.5a5.5 5.5 0 1 0 7 7z" fill="currentColor"/></svg>
            }
          </button>
          <button onClick={() => navigate({screen:'analytics'})} title="Analytics"
            style={{ width:36, height:36, background:"transparent", border:"1px solid var(--rule)", cursor:"pointer", color:"var(--ink-60)", display:"flex", alignItems:"center", justifyContent:"center" }}>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2" y="9" width="2.5" height="5" rx="1" fill="currentColor"/><rect x="6.75" y="6" width="2.5" height="8" rx="1" fill="currentColor"/><rect x="11.5" y="3" width="2.5" height="11" rx="1" fill="currentColor"/></svg>
          </button>
          <button onClick={() => navigate({screen:'profile'})} title="Profile"
            style={{ width:36, height:36, background:"transparent", border:"1px solid var(--rule)", cursor:"pointer", color:"var(--ink-60)", display:"flex", alignItems:"center", justifyContent:"center" }}>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5.5" r="3" stroke="currentColor" strokeWidth="1.4"/><path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/></svg>
          </button>
        </div>
      </div>

      {/* Split toggle */}
      <div style={{ display:"flex", gap:5, marginTop:16, flexWrap:"wrap" }}>
        {Object.entries(SPLITS).map(([key, s]) => (
          <button key={key} onClick={() => dispatch({ type:"SET_SPLIT", split:key })}
            style={{ flex:"1 1 auto", fontFamily:"var(--font-mono)", fontSize:9, letterSpacing:0.1, textTransform:"uppercase", padding:"8px 3px",
              background: activeSplit===key ? "var(--ink)" : "transparent", color: activeSplit===key ? "var(--paper)" : "var(--ink)",
              border:"1px solid var(--ink)", borderRadius:0, cursor:"pointer" }}>{s.label}</button>

        <button onClick={() => dispatch({ type:"TOGGLE_DETAILED" })}
          style={{ fontFamily:"var(--font-mono)", fontSize:9.5, letterSpacing:0.1, textTransform:"uppercase", padding:"4px 10px",
            background: detailedMode ? "var(--accent)" : "transparent", color: detailedMode ? "#fff" : "var(--ink-60)",
            border:`1px solid ${detailedMode?"var(--accent)":"var(--ink-30)"}`, borderRadius:0, cursor:"pointer" }}>
          {detailedMode ? "Detailed" : "Simple"}
        </button>
      </div>

      {/* Ring */}
      <div style={{ marginTop:20, display:"flex", justifyContent:"center" }}>
        <div style={{ position:"relative", width:260, height:260 }}>
          <RingStack progress={progress} targets={targets} size={260} strokeWidth={9} gap={3}/>
          <div style={{ position:"absolute", inset:0, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", textAlign:"center" }}>
            <div style={{ fontFamily:"var(--font-mono)", fontSize:9.5, letterSpacing:0.2, textTransform:"uppercase", color:"var(--ink-60)" }}>Week Volume</div>
            <div style={{ fontFamily:"var(--font-display)", fontSize:68, lineHeight:0.85, letterSpacing:-0.05, marginTop:8, fontVariantNumeric:"tabular-nums", fontWeight:400 }}>{totalDone}</div>
            <div style={{ fontFamily:"var(--font-mono)", fontSize:10, letterSpacing:0.12, color:"var(--ink-60)", marginTop:2 }}>of {totalTarget}</div>
          </div>
        </div>
      </div>
      <div style={{ marginTop:20 }}><GroupKey progress={progress} targets={targets}/></div>

      {/* Day cards — custom or regular */}
      {isCustom ? (
        <>
          <Rule label="My Custom Split"/>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
            {customPlan.days.map((plan, i) => {
              const d = i+1;
              const dayExtra = splitCompletions.filter(c=>c.day===d&&c.slot>=1000).length;
              const isDone = splitCompletedDays.includes(d);
              return (
                <div key={d} style={{ position:"relative" }}>
                  <DayCard day={d} plan={{...plan,main:plan.main||[],other:plan.other||[]}} dayColor={DAY_COLORS[i%DAY_COLORS.length]}
                    completed={dayExtra} total={Math.max(dayExtra,1)} isCurrent={d===currentDay&&!isDone} isDone={isDone}
                    onClick={() => navigate({ screen:"day", dayId:d })}/>
                  <button onClick={() => { if(window.confirm(`Remove ${plan.title}?`)) dispatch({ type:"REMOVE_CUSTOM_DAY", index:i }); }}
                    style={{ position:"absolute", top:4, right:4, width:20, height:20, background:"var(--ink)", color:"var(--paper)", border:"none", cursor:"pointer", fontFamily:"var(--font-mono)", fontSize:11, display:"flex", alignItems:"center", justifyContent:"center", zIndex:1 }}>×</button>
                </div>
              );
            })}
          </div>
          <button onClick={() => { const t=window.prompt("Day name:", `Day ${customPlan.days.length+1}`)||`Day ${customPlan.days.length+1}`; dispatch({ type:"ADD_CUSTOM_DAY", title:t }); }}
            style={{ width:"100%", marginTop:10, fontFamily:"var(--font-mono)", fontSize:11, letterSpacing:0.14, textTransform:"uppercase", padding:"14px", background:"transparent", color:"var(--ink)", border:"1px dashed var(--ink)", cursor:"pointer", borderRadius:0 }}>
            + Add Day
          </button>
        </>
      ) : (
        <>
          <Rule label={`${splitData.label} · ${splitCompletedDays.length < totalDays ? "Day "+currentDay+" on deck" : "Week Complete"}`}/>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
            {splitData.days.map((plan, i) => {
              const d = i+1;
              const dayComp = splitCompletions.filter(c=>c.day===d&&c.slot<1000).length;
              const dayExtra = splitCompletions.filter(c=>c.day===d&&c.slot>=1000).length;
              const total = plan.main.length + plan.other.length + dayExtra;
              const isDone = splitCompletedDays.includes(d);
              return <DayCard key={d} day={d} plan={plan} dayColor={DAY_COLORS[i%DAY_COLORS.length]}
                completed={dayComp+dayExtra} total={total} isCurrent={d===currentDay&&!isDone} isDone={isDone}
                onClick={() => navigate({ screen:"day", dayId:d })}/>;
            })}
            {hasExtraDay && (() => {
              const d = splitData.days.length + 1;
              const isDone = splitCompletedDays.includes(d);
              const dayExtra = splitCompletions.filter(c=>c.day===d&&c.slot>=1000).length;
              return (
                <DayCard key="extra" day={d} plan={{ title: extraDays[activeSplit]?.title||"Extra Day", sub:"Optional · your exercises", main:[], other:[] }}
                  dayColor="oklch(0.62 0.06 250)" completed={dayExtra} total={Math.max(dayExtra,1)}
                  isCurrent={d===currentDay&&!isDone} isDone={isDone}
                  onClick={() => navigate({ screen:"day", dayId:d })}
                  onRemove={() => dispatch({ type:"REMOVE_EXTRA_DAY", split:activeSplit })}/>
              );
            })()}
          </div>
          {!hasExtraDay && (
            <button onClick={() => { const t=window.prompt("Day name:","Extra Day")||"Extra Day"; dispatch({ type:"ADD_EXTRA_DAY", split:activeSplit, title:t }); }}
              style={{ width:"100%", marginTop:8, fontFamily:"var(--font-mono)", fontSize:10, letterSpacing:0.14, textTransform:"uppercase", padding:"12px", background:"transparent", color:"var(--ink-60)", border:"1px dashed var(--rule)", cursor:"pointer" }}>
              + Add Optional Day
            </button>
          )}

      )}

      {/* Volume bars */}
      <Rule label="Volume By Group"/>
      <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
        {MUSCLE_GROUPS.map(g => {
          const target = targets[g]||0, done = progress[g]||0, pct = target ? done/target : 0;
          return (
            <div key={g}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline" }}>
                <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                  <span style={{ width:8, height:8, borderRadius:999, background:MG_COLORS[g] }}/>
                  <span style={{ fontFamily:"var(--font-display)", fontSize:16, letterSpacing:-0.1 }}>{MG_LABEL[g]}</span>
                </div>
                <div style={{ fontFamily:"var(--font-mono)", fontSize:11, letterSpacing:0.08, color:"var(--ink-60)", fontVariantNumeric:"tabular-nums" }}>
                  {done}/{target}<span style={{ marginLeft:8, color:pct>=1?"var(--success)":"var(--accent)" }}>{pct>=1?"DONE":"LAGGING"}</span>
                </div>
              </div>
              <div style={{ height:5, background:"var(--rule)", marginTop:5, position:"relative" }}>
                <div style={{ position:"absolute", inset:0, width:`${Math.min(1,pct)*100}%`, background:MG_COLORS[g], transition:"width 500ms ease" }}/>
              </div>

        })}
      </div>

      <div style={{ marginTop:28, paddingTop:14, borderTop:"1px solid var(--ink)", display:"flex", justifyContent:"flex-end" }}>
        <span onClick={() => { if(window.confirm('Reset this week? All progress will be permanently deleted.')) dispatch({ type:"RESET_SPLIT" }); }} style={{ fontFamily:"var(--font-mono)", fontSize:9.5, letterSpacing:0.18, textTransform:"uppercase", color:"var(--ink-60)", cursor:"pointer", borderBottom:"1px solid var(--ink-60)" }}>Reset Week</span>
      </div>
    </div>
  );
}

// ── Day Screen ──
function DayScreen({ state, dispatch, navigate, dayId, isPro=false, setShowPaywall }) {
  const { activeSplit, completions, completedDays, setsLog, hiddenSlots, customPlan, detailedMode, extraPlan: stateExtraPlan, detailedSets: stateDetailedSets } = state;
  const isCustom = activeSplit === 'custom';
  const splitData = isCustom ? customPlan : SPLITS[activeSplit];
  const isExtraDay = !isCustom && dayId > splitData.days.length;
  const plan = isExtraDay
    ? { title:(state.extraDays?.[activeSplit]?.title||"Extra Day"), sub:"Optional · add from catalog", main:[], other:[] }
    : (splitData.days[dayId-1] || { title:`Day ${dayId}`, sub:"", main:[], other:[] });
  const splitCompletions = completions[activeSplit] || [];
  const splitCompletedDays = completedDays[activeSplit] || [];
  const splitSets = (setsLog||{})[activeSplit] || {};
  const dayHidden = ((hiddenSlots||{})[activeSplit]||{})[dayId] || [];
  const [searchQ, setSearchQ] = useState("");

  const mainIds = plan.main || [], otherIds = plan.other || [];
  const allPlanIds = [...mainIds, ...otherIds];
  const plannedDone = new Set(splitCompletions.filter(c=>c.day===dayId&&c.slot<1000).map(c=>c.slot));
  const dayExtraPlan = ((stateExtraPlan||{})[activeSplit]||{})[dayId] || [];
  const extraCheckedSlots = new Set(splitCompletions.filter(c=>c.day===dayId&&c.slot>=1000).map(c=>c.slot));
  const extras = dayExtraPlan.map(e => ({...e, checked: extraCheckedSlots.has(e.slot)}));
  const extraIds = new Set(dayExtraPlan.map(e => e.id));

  const visibleMainCount = mainIds.filter((_,i)=>!dayHidden.includes(i)).length;
  const visibleOtherCount = otherIds.filter((_,i)=>!dayHidden.includes(mainIds.length+i)).length;
  const totalCount = visibleMainCount + visibleOtherCount + dayExtraPlan.length;
  const doneCount = [...plannedDone].filter(s=>!dayHidden.includes(s)).length + extras.filter(e=>e.checked).length;
  const pct = totalCount ? doneCount/totalCount : 0;
  const isDone = splitCompletedDays.includes(dayId);

  // Week progress for lagging calc
  const weekProg = {}; MUSCLE_GROUPS.forEach(g=>weekProg[g]=0);
  splitCompletions.forEach(c=>{ const ex=exerciseById(c.id); if(ex.group) weekProg[ex.group]++; });
  const weekTargets = getWeeklyTargets(activeSplit, customPlan?.days||[]);
  const todayGroupsCovered = new Set(allPlanIds.map(id=>exerciseById(id).group));

  const laggingGroups = (() => {
    const lagging = new Set();
    // Check every day before current (not just "done" days) for skipped exercises
    for (let prevDay = 1; prevDay < dayId; prevDay++) {
      const prevPlan = isCustom ? (customPlan.days[prevDay-1]||{}) : (SPLITS[activeSplit]?.days[prevDay-1]||{});
      const prevMainIds = prevPlan.main||[], prevOtherIds = prevPlan.other||[];
      const prevAllIds = [...prevMainIds, ...prevOtherIds];
      if (prevAllIds.length === 0) continue;
      const prevHidden = ((hiddenSlots||{})[activeSplit]||{})[prevDay] || [];
      const prevExtras = ((state.extraPlan||{})[activeSplit]||{})[prevDay] || [];
      [...prevAllIds.map((id,slot) => ({id, slot})), ...prevExtras.map(e => ({id:e.id, slot:e.slot}))].forEach(({id, slot}) => {
        if (prevAllIds[slot] !== undefined && prevHidden.includes(slot)) return;
        const wasDone = splitCompletions.some(c => c.day===prevDay && c.slot===slot);
        if (!wasDone) {
          const ex = exerciseById(id);
          if (ex.group && !todayGroupsCovered.has(ex.group)) lagging.add(ex.group);
        }
      });
    }
    return MUSCLE_GROUPS.filter(g => lagging.has(g));
  })();
  const laggingRecs = {};
  laggingGroups.forEach(g => {
    laggingRecs[g] = Object.values(EXERCISES).filter(ex=>ex.group===g&&!allPlanIds.includes(ex.id)).slice(0,5);
  });

  // Catalog — hidden (removed) exercises are excluded so they re-appear here
  const visiblePlanIds = [
    ...mainIds.filter((_,i) => !dayHidden.includes(i)),
    ...otherIds.filter((_,i) => !dayHidden.includes(mainIds.length + i)),
  ];
  const inPlanSet = new Set([...visiblePlanIds, ...dayExtraPlan.map(e=>e.id)]);
  const q = searchQ.trim().toLowerCase();
  const catalogByGroup = {};
  MUSCLE_GROUPS.forEach(g => catalogByGroup[g]=[]);
  Object.values(EXERCISES).forEach(ex => { if(!inPlanSet.has(ex.id)) catalogByGroup[ex.group].push(ex); });
  const filteredCatalog = {};
  MUSCLE_GROUPS.forEach(g => { filteredCatalog[g] = q ? catalogByGroup[g].filter(ex=>ex.name.toLowerCase().includes(q)) : catalogByGroup[g]; });
  const catalogHasResults = MUSCLE_GROUPS.some(g=>filteredCatalog[g].length>0);

  const getSets = (slot, tgt) => ({ done: splitSets[`${dayId}_${slot}`]||0, target:tgt });
  const splitDetailedSets = (stateDetailedSets||{})[activeSplit] || {};
  const getDetailedEntries = slot => splitDetailedSets[`${dayId}_${slot}`] || [];
  const mkAddSetEntry    = slot => e => dispatch({ type:"ADD_SET_ENTRY",    split:activeSplit, day:dayId, slot, reps:e.reps, kg:e.kg });
  const mkEditSetEntry   = slot => (index, e) => dispatch({ type:"EDIT_SET_ENTRY",   split:activeSplit, day:dayId, slot, index, reps:e.reps, kg:e.kg });
  const mkDeleteSetEntry = slot => index => dispatch({ type:"DELETE_SET_ENTRY", split:activeSplit, day:dayId, slot, index });

  return (
    <div style={{ padding:"8px 24px 120px", fontFamily:"var(--font-body)", color:"var(--ink)" }}>
      {/* Header */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", paddingTop:4 }}>
        <button onClick={() => navigate({ screen:"home" })} style={{ background:"var(--paper)", cursor:"pointer", border:"1px solid var(--ink)", fontFamily:"var(--font-mono)", fontSize:10.5, letterSpacing:0.16, textTransform:"uppercase", color:"var(--ink)", padding:"10px 14px", minHeight:44, display:"flex", alignItems:"center" }}>← Back</button>
        <div style={{ display:"flex", gap:4, fontFamily:"var(--font-mono)", fontSize:10.5, letterSpacing:0.14, textTransform:"uppercase", color:"var(--ink-60)" }}>
          {dayId>1 && <button onClick={()=>navigate({screen:"day",dayId:dayId-1})} style={{ background:"transparent", border:"none", cursor:"pointer", fontFamily:"var(--font-mono)", fontSize:10.5, letterSpacing:0.14, textTransform:"uppercase", color:"var(--ink-60)", padding:"10px 8px", minHeight:44, display:"flex", alignItems:"center" }}>‹ Prev</button>}
          {dayId<splitData.days.length+(state.extraDays?.[activeSplit]?.enabled?1:0) && <button onClick={()=>navigate({screen:"day",dayId:dayId+1})} style={{ background:"transparent", border:"none", cursor:"pointer", fontFamily:"var(--font-mono)", fontSize:10.5, letterSpacing:0.14, textTransform:"uppercase", color:"var(--ink-60)", padding:"10px 8px", minHeight:44, display:"flex", alignItems:"center" }}>Next ›</button>}
        </div>
      </div>

      {/* Folio */}
      <div style={{ marginTop:16, display:"flex", alignItems:"flex-end", gap:14 }}>
        <div style={{ fontFamily:"var(--font-display)", fontSize:130, lineHeight:0.82, letterSpacing:-0.06, fontVariantNumeric:"tabular-nums", fontWeight:400, fontStyle:"italic", color:DAY_COLORS[(dayId-1)%DAY_COLORS.length] }}>{dayId}</div>
        <div style={{ paddingBottom:10, flex:1 }}>
          <div style={{ fontFamily:"var(--font-mono)", fontSize:10, letterSpacing:0.18, textTransform:"uppercase", color:"var(--ink-60)" }}>{SPLITS[activeSplit]?.label||"Custom"}</div>
          <div style={{ fontFamily:"var(--font-display)", fontSize:22, letterSpacing:-0.15, marginTop:4, lineHeight:1.1 }}>{plan.title}</div>
          <div style={{ fontFamily:"var(--font-body)", fontSize:12.5, color:"var(--ink-60)", marginTop:3, fontStyle:"italic" }}>{plan.sub}</div>
        </div>
      </div>

      {/* Progress */}
      <div style={{ marginTop:14, display:"flex", alignItems:"center", gap:12 }}>
        <div style={{ flex:1, height:2, background:"var(--rule)", position:"relative" }}>
          <div style={{ position:"absolute", inset:0, width:`${pct*100}%`, background:"var(--ink)", transition:"width 400ms ease" }}/>
        </div>
        <div style={{ fontFamily:"var(--font-mono)", fontSize:11, letterSpacing:0.1, fontVariantNumeric:"tabular-nums" }}>{doneCount}/{totalCount}</div>
      </div>

      {/* Main */}
      {mainIds.length > 0 && <Rule label="Main"/>}
      {mainIds.map((id, i) => {
        if (dayHidden.includes(i)) return null;
        const ex = exerciseById(id);
        const s = getSets(i, SETS_MAIN);
        return <ExerciseRow key={`m-${i}`} ex={ex} isMain checked={plannedDone.has(i)}
          onToggle={() => dispatch({ type:plannedDone.has(i)?"UNCHECK":"CHECK", split:activeSplit, day:dayId, slot:i, id })}
          setsDone={s.done} setsTarget={s.target}
          detailedMode={detailedMode} detailedEntries={getDetailedEntries(i)} onAddSetEntry={mkAddSetEntry(i)} onEditSetEntry={mkEditSetEntry(i)} onDeleteSetEntry={mkDeleteSetEntry(i)}
          onRemove={() => dispatch({ type:"HIDE_SLOT", split:activeSplit, day:dayId, slot:i })}/>;
      })}

      {/* Secondary */}
      {(otherIds.length > 0 || extras.length > 0) && <Rule label="Secondary"/>}
      {otherIds.map((id, i) => {
        const slot = mainIds.length + i;
        if (dayHidden.includes(slot)) return null;
        const ex = exerciseById(id);
        const s = getSets(slot, SETS_ACC);
        return <ExerciseRow key={`o-${i}`} ex={ex} checked={plannedDone.has(slot)}
          onToggle={() => dispatch({ type:plannedDone.has(slot)?"UNCHECK":"CHECK", split:activeSplit, day:dayId, slot, id })}
          setsDone={s.done} setsTarget={s.target}

function WorkoutCalendar({ weekHistory }) {
  const now = new Date();
  const year = now.getFullYear(), month = now.getMonth();
  const firstDow = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const [selected, setSelected] = React.useState(null);

  // Map each calendar date to its week entry
  const dayToEntry = {};
  weekHistory.forEach(w => {
    const d = new Date(w.completedAt);
    if (d.getFullYear()===year && d.getMonth()===month) dayToEntry[d.getDate()] = w;
  });

  const cells = [];
  for (let i=0; i<firstDow; i++) cells.push(null);
  for (let d=1; d<=daysInMonth; d++) cells.push(d);
  const monthLabel = now.toLocaleDateString("en-AU", { month:"long", year:"numeric" });

  const entry = selected ? dayToEntry[selected] : null;

  return (
    <div>
      <div style={{ fontFamily:"var(--font-mono)", fontSize:9.5, letterSpacing:0.14, textTransform:"uppercase", color:"var(--ink-60)", marginBottom:10, textAlign:"center" }}>{monthLabel}</div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:2, marginBottom:4 }}>
        {["Su","Mo","Tu","We","Th","Fr","Sa"].map(d=>(
          <div key={d} style={{ textAlign:"center", fontFamily:"var(--font-mono)", fontSize:7.5, letterSpacing:0.1, textTransform:"uppercase", color:"var(--ink-60)", padding:"3px 0" }}>{d}</div>
        ))}
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:2 }}>
        {cells.map((d,i) => {
          if (!d) return <div key={`e${i}`}/>;
          const isToday = d===now.getDate();
          const hasWorkout = !!dayToEntry[d];
          const isSelected = selected===d;
          return (
            <div key={d} onClick={() => hasWorkout && setSelected(isSelected ? null : d)}
              style={{
                aspectRatio:"1", display:"flex", alignItems:"center", justifyContent:"center",
                background: isToday ? "var(--ink)" : isSelected ? "#f97316" : hasWorkout ? "rgba(249,115,22,0.15)" : "transparent",
                border: `1px solid ${isToday ? "var(--ink)" : isSelected ? "#f97316" : hasWorkout ? "#f97316" : "var(--rule)"}`,
                borderRadius:3, cursor: hasWorkout ? "pointer" : "default",
              }}>
              <span style={{ fontFamily:"var(--font-mono)", fontSize:10, fontVariantNumeric:"tabular-nums",
                color: isToday ? "var(--paper)" : isSelected ? "#fff" : hasWorkout ? "#f97316" : "var(--ink-60)" }}>{d}</span>
            </div>
          );
        })}
      </div>

      {/* Workout detail panel */}
      {entry && (
        <div style={{ marginTop:14, border:"1px solid #f97316", padding:"14px 16px", borderRadius:2 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
            <div>
              <div style={{ fontFamily:"var(--font-mono)", fontSize:8.5, letterSpacing:0.16, textTransform:"uppercase", color:"#f97316" }}>
                {new Date(entry.completedAt).toLocaleDateString("en-AU",{weekday:"short",day:"numeric",month:"short"})}
              </div>
              <div style={{ fontFamily:"var(--font-display)", fontSize:17, fontStyle:"italic", marginTop:2 }}>
                {(typeof SPLITS !== 'undefined' && SPLITS[entry.split]?.label) || entry.split}
              </div>
            </div>
            <button onClick={() => setSelected(null)} style={{ background:"transparent", border:"none", color:"var(--ink-60)", fontSize:18, cursor:"pointer", lineHeight:1, padding:"0 4px" }}>×</button>
          </div>
          {(() => {
            // Group completions by day number
            const byDay = {};
            (entry.completions||[]).forEach(c => {
              if (!byDay[c.day]) byDay[c.day] = [];
              const ex = exerciseById(c.id);
              const dsKey = `${c.day}_${c.slot}`;
              const sets = (entry.detailedSets||{})[dsKey] || [];
              byDay[c.day].push({ ex, sets });
            });
            return Object.entries(byDay).sort((a,b)=>+a[0]-+b[0]).map(([day, exList]) => (
              <div key={day} style={{ marginBottom:10 }}>
                <div style={{ fontFamily:"var(--font-mono)", fontSize:7.5, letterSpacing:0.14, textTransform:"uppercase", color:"var(--ink-60)", marginBottom:5, borderBottom:"1px solid var(--rule)", paddingBottom:4 }}>Day {day}</div>
                {exList.map(({ ex, sets }, idx) => (
                  <div key={idx} style={{ display:"flex", alignItems:"baseline", justifyContent:"space-between", padding:"4px 0", borderBottom:"1px solid var(--rule)" }}>
                    <div style={{ fontFamily:"var(--font-body)", fontSize:13 }}>{ex.name}</div>
                    <div style={{ fontFamily:"var(--font-mono)", fontSize:9.5, color:"var(--ink-60)", flexShrink:0, marginLeft:8 }}>
                      {sets.length > 0
                        ? sets.map((s,i) => `${s.reps}×${s.kg}kg`).join(" · ")
                        : `${sets.length || "–"} sets`}
                    </div>
                  </div>
                ))}
              </div>
            ));
          })()}
        </div>
      )}
    </div>
  );
}

function AnalyticsScreen({ state, navigate, setShowPaywall }) {
  const { weekHistory=[], activeSplit, completions, detailedSets: stateDS={} } = state;
  const [period, setPeriod] = useState('week');
  const now = Date.now(), DAY = 86400000;
  const cutoff = period==='week' ? now-7*DAY : period==='month' ? now-30*DAY : 0;
  const filteredHistory = weekHistory.filter(w => w.completedAt >= cutoff);
  const currentComp = period==='week' ? (completions[activeSplit]||[]) : [];
  const allComp = [...filteredHistory.flatMap(w=>w.completions), ...currentComp];

  // Live (current in-progress week) data
  const liveDS = stateDS[activeSplit] || {};
  const liveComp = completions[activeSplit] || [];
  const liveVolume = Object.values(liveDS).reduce((s, entries) =>
    s + entries.reduce((es, e) => es + (e.reps||0)*(e.kg||0), 0), 0);
  const liveSets = Object.values(liveDS).reduce((s, entries) => s + entries.length, 0);

  // Muscle heat map (includes live)
  const muscleVol = {}; MUSCLE_GROUPS.forEach(g=>muscleVol[g]=0);
  allComp.filter(c=>c.slot<1000).forEach(c=>{ const ex=exerciseById(c.id); if(ex.group) muscleVol[ex.group]++; });
  const maxVol = Math.max(1,...Object.values(muscleVol));
  const bodyIntensity = {}; MUSCLE_GROUPS.forEach(g=>bodyIntensity[g]=muscleVol[g]/maxVol);

  // Exercise frequency
  const exerciseFreq = {};
  allComp.filter(c=>c.slot<1000).forEach(c=>{ exerciseFreq[c.id]=(exerciseFreq[c.id]||0)+1; });
  const topEx = Object.entries(exerciseFreq).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const recentWeeks = [...weekHistory].reverse().slice(0,8);

  // ── Hevy-style analytics (include live week) ──
  const totalVolume = weekHistory.reduce((tot, w) =>
    tot + Object.values(w.detailedSets||{}).reduce((s, entries) =>
      s + entries.reduce((es, e) => es + (e.reps||0)*(e.kg||0), 0), 0), 0) + liveVolume;

  const sortedW = [...weekHistory].sort((a,b) => b.completedAt - a.completedAt);
  let streak = sortedW.length > 0 ? 1 : 0;
  if (liveComp.length > 0 && sortedW.length === 0) streak = 1;
  for (let i = 1; i < sortedW.length; i++) {
    if (sortedW[i-1].completedAt - sortedW[i].completedAt <= 14*DAY) streak++;
    else break;
  }

  const totalSets = weekHistory.reduce((tot, w) =>
    tot + Object.values(w.detailedSets||{}).reduce((s, entries) => s + entries.length, 0), 0) + liveSets;

  const histVols = [...weekHistory].sort((a,b) => a.completedAt-b.completedAt).slice(-7).map(w => ({
    label: new Date(w.completedAt).toLocaleDateString("en-AU",{day:"numeric",month:"short"}),
    v: Object.values(w.detailedSets||{}).reduce((s, entries) =>
      s + entries.reduce((es, e) => es + (e.reps||0)*(e.kg||0), 0), 0)
  }));
  const weeklyVols = liveVolume > 0 ? [...histVols, { label:"Now", v:liveVolume }].slice(-8) : histVols.slice(-8);
  const maxWV = Math.max(1, ...weeklyVols.map(w=>w.v));

  // Personal records (completed weeks + live)
  const prMap = {};
  const addToMap = (ds, comp, date) => {
    const slotMap = {};
    (comp||[]).forEach(c => { slotMap[`${c.day}_${c.slot}`] = c.id; });
    Object.entries(ds||{}).forEach(([key, entries]) => {
      const exId = slotMap[key]; if (!exId) return;
      entries.forEach(e => {
        if ((e.kg||0) > 0 && (!prMap[exId] || e.kg > prMap[exId].kg))
          prMap[exId] = { kg: e.kg, date };
      });
    });
  };
  weekHistory.forEach(w => addToMap(w.detailedSets, w.completions, new Date(w.completedAt)));
  addToMap(liveDS, liveComp, new Date());
  const topPRs = Object.entries(prMap).sort((a,b) => b[1].kg - a[1].kg).slice(0, 6);

  const volDisplay = totalVolume >= 1000 ? `${(totalVolume/1000).toFixed(1)}k` : `${Math.round(totalVolume)}`;
  const hasData = allComp.filter(c=>c.slot<1000).length > 0;

  return (
    <div style={{ padding:"8px 24px 120px", color:"var(--ink)" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", paddingTop:8 }}>
        <div>
          <div style={{ fontFamily:"var(--font-mono)", fontSize:10, letterSpacing:0.18, textTransform:"uppercase", color:"var(--ink-60)" }}>Progress</div>
          <div style={{ fontFamily:"var(--font-display)", fontSize:42, lineHeight:0.95, letterSpacing:-0.035, marginTop:10 }}><span style={{ fontStyle:"italic" }}>Analytics</span></div>
        </div>
      </div>
      <div style={{ display:"flex", gap:4, marginTop:16 }}>
        {[['week','This Week'],['month','Month'],['all','All Time']].map(([k,l])=>(
          <button key={k} onClick={()=>setPeriod(k)} style={{ flex:1, fontFamily:"var(--font-mono)", fontSize:9.5, letterSpacing:0.1, textTransform:"uppercase", padding:"7px 4px", background:period===k?"var(--ink)":"transparent", color:period===k?"var(--paper)":"var(--ink)", border:"1px solid var(--ink)", cursor:"pointer" }}>{l}</button>
        ))}
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginTop:18 }}>
        {[
          { label:"Volume", v:volDisplay, unit:"kg" },
          { label:"Streak", v:streak, unit:"wks" },
          { label:"Workouts", v:weekHistory.length, unit:null },
          { label:"Sets Logged", v:totalSets, unit:null }
        ].map(s=>(
          <div key={s.label} style={{ border:"1px solid var(--rule)", padding:"12px 14px" }}>
            <div style={{ display:"flex", alignItems:"baseline", gap:4 }}>
              <div style={{ fontFamily:"var(--font-display)", fontSize:28, letterSpacing:-0.04, lineHeight:1 }}>{s.v}</div>
              {s.unit&&<div style={{ fontFamily:"var(--font-mono)", fontSize:9, letterSpacing:0.1, textTransform:"uppercase", color:"var(--ink-60)" }}>{s.unit}</div>}
            </div>
            <div style={{ fontFamily:"var(--font-mono)", fontSize:8.5, letterSpacing:0.14, textTransform:"uppercase", color:"var(--ink-60)", marginTop:5 }}>{s.label}</div>
          </div>
        ))}
      </div>
      <Rule label="Calendar"/>
      <WorkoutCalendar weekHistory={weekHistory}/>
      {/* ── Locked content — blur for non-subscribers ── */}
      {(() => {
        const isLocked = !(state.user && state.isPro);
        const lockedContent = (
          <>
            <Rule label="Muscle Map"/>
            {hasData ? <BodyMap intensities={bodyIntensity}/> : (
              <div style={{ textAlign:"center", padding:"24px 0", fontFamily:"var(--font-mono)", fontSize:10, color:"var(--ink-60)", letterSpacing:0.12 }}>Train to see your muscle heat map</div>
            )}
            <Rule label="Weekly Volume"/>
            {weeklyVols.length > 0 ? (
              <div>
                <div style={{ display:"flex", alignItems:"flex-end", gap:3, height:68 }}>
                  {weeklyVols.map((wv,i) => {
                    const pct = wv.v / maxWV;
                    return (
                      <div key={i} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center" }}>
                        <div style={{ width:"100%", background:"var(--ink)", opacity:0.35+pct*0.65, height:Math.max(4, Math.round(pct*56)), transition:"height 500ms ease", borderRadius:"2px 2px 0 0" }}/>
                      </div>
                    );

const PRIVACY_URL = 'https://app.termly.io/document/privacy-policy/23c9f527-18f2-4b26-aad1-2dc98c4b69e2';

function AuthScreen({ state, dispatch, navigate }) {
  const { useState: useStateAuth } = React;
  const [mode, setMode] = useStateAuth('welcome');
  const [signupStep, setSignupStep] = useStateAuth(0);
  const [form, setForm] = useStateAuth({ email:'', password:'', name:'', goal:'', experience:'', daysPerWeek:'4' });
  const [termsOk, setTermsOk] = useStateAuth(false);
  const [error, setError] = useStateAuth('');
  const [loading, setLoading] = useStateAuth(false);
  const set = (k, v) => setForm(f => ({...f, [k]:v}));
  const GOALS = [
    { id:'muscle',   label:'Build Muscle',    sub:'Gain strength & size' },
    { id:'lose',     label:'Lose Weight',      sub:'Cut fat, stay lean' },
    { id:'fitness',  label:'Improve Fitness',  sub:'Cardio & endurance' },
    { id:'active',   label:'Stay Active',      sub:'Healthy habits' },
  ];
  const EXPERIENCES = [
    { id:'beginner',     label:'Beginner',     sub:'< 1 year' },
    { id:'intermediate', label:'Intermediate', sub:'1–3 years' },
    { id:'advanced',     label:'Advanced',     sub:'3+ years' },
  ];
  const DAYS = ['3','4','5','6'];
  const STEPS = ['account','name','goal','experience','days','plan'];

  const doSignIn = async () => {
    if (!form.email || !form.password) { setError('Please fill in all fields'); return; }
    setLoading(true); setError('');
    const { data, error: err } = await sb.auth.signInWithPassword({ email: form.email, password: form.password });
    if (err) { setError(err.message); setLoading(false); return; }
    const { data: ud } = await sb.from('user_data').select('profile,training').eq('user_id', data.user.id).maybeSingle();
    if (ud?.training) {
      dispatch({ type:'LOAD_CLOUD', profile: ud.profile || {}, training: ud.training });
    } else {
      dispatch({ type:'SET_USER', user:{ email: data.user.email, ...(data.user.user_metadata || {}) } });
    }
    setLoading(false);
    navigate({ screen:'home' });
  };
  const doCreateAccount = async (planType) => {
    const { data, error: err } = await sb.auth.signUp({
      email: form.email,
      password: form.password,
      options: { data: { name: form.name, goal: form.goal, experience: form.experience, daysPerWeek: form.daysPerWeek } }
    });
    if (err) { setError(err.message); setLoading(false); return false; }
    if (!data.session) { setLoading(false); setMode('email-confirm'); return false; }
    dispatch({ type:'SET_USER', user:{ email:form.email, name:form.name, goal:form.goal, experience:form.experience, daysPerWeek:form.daysPerWeek } });
    if (planType !== 'free') {
      dispatch({ type:'SET_PLAN', planType });
      window.open(planType==='monthly' ? STRIPE_MONTHLY : STRIPE_YEARLY, '_blank');
    }
    navigate({ screen:'home' });
    return true;
  };
  const doNext = async () => {
    const step = STEPS[signupStep];
    if (step==='account' && (!form.email || !form.password)) { setError('Fill in email and password'); return; }
    if (step==='account' && form.password.length < 8) { setError('Password must be at least 8 characters'); return; }
    if (step==='name' && !form.name.trim()) { setError('Enter your name'); return; }
    if (step==='goal' && !form.goal) { setError('Select a goal'); return; }
    if (step==='experience' && !form.experience) { setError('Select your level'); return; }
    if (step==='plan' && !termsOk) { setError('Accept the terms to continue'); return; }
    setError('');
    if (signupStep < STEPS.length-1) { setSignupStep(s=>s+1); return; }
    setLoading(true);
    await doCreateAccount(form.selectedPlan==='monthly' ? 'monthly' : 'yearly');
  };
  const skipPlan = async () => {
    setLoading(true); setError('');
    await doCreateAccount('free');
  };

  ink:   { paper:"oklch(0.16 0.012 260)", ink:"oklch(0.95 0.008 80)", ink60:"oklch(0.68 0.012 80)", ink30:"oklch(0.54 0.012 80)", rule:"oklch(0.36 0.012 260)", accentTint:"oklch(0.22 0.04 28 / 0.5)" },
  court: { paper:"oklch(0.94 0.015 95)",  ink:"oklch(0.22 0.04 160)", ink60:"oklch(0.48 0.03 160)", ink30:"oklch(0.72 0.015 160)", rule:"oklch(0.82 0.02 95)", accentTint:"oklch(0.92 0.04 28 / 0.6)" },
};
const TYPE_PAIRS = {
  "serif-geist": { display:`"Instrument Serif","Times New Roman",serif`, body:`"Geist","Helvetica Neue",system-ui,sans-serif`, mono:`"Geist Mono",ui-monospace,monospace` },
  "editorial":   { display:`"EB Garamond",Georgia,serif`, body:`"EB Garamond",Georgia,serif`, mono:`"IBM Plex Mono",ui-monospace,monospace` },
};

const INITIAL_STATE = {
  activeSplit:   "pushPull",
  completions:   { pushPull:[], upperLower:[], fullBody:[], custom:[] },
  completedDays: { pushPull:[], upperLower:[], fullBody:[], custom:[] },
  setsLog:       { pushPull:{}, upperLower:{}, fullBody:{}, custom:{} },
  hiddenSlots:   { pushPull:{}, upperLower:{}, fullBody:{}, custom:{} },
  extraPlan:     { pushPull:{}, upperLower:{}, fullBody:{}, custom:{} },
  detailedSets:  { pushPull:{}, upperLower:{}, fullBody:{}, custom:{} },
  customPlan:    { days:[] },
  extraDays:     { pushPull:null, upperLower:null, fullBody:null },
  detailedMode:  false,
  theme:         'paper',
  isPro:         false,
  planType:      'free',
  user:          null,
  weekHistory:   [],
  bodyLog:       [],
  measurements:  {},
};

function loadState() {
  try {
    const s = localStorage.getItem("tl-state");
    if (!s) return INITIAL_STATE;
    const parsed = JSON.parse(s);
    if (Array.isArray(parsed.completions)) return INITIAL_STATE;
    const activeSplit = SPLITS[parsed.activeSplit] ? parsed.activeSplit : "pushPull";
    return {
      activeSplit,
      completions:   { ...INITIAL_STATE.completions,   ...(parsed.completions   || {}) },
      completedDays: { ...INITIAL_STATE.completedDays, ...(parsed.completedDays || {}) },
      setsLog:       { ...INITIAL_STATE.setsLog,       ...(parsed.setsLog       || {}) },
      hiddenSlots:   { ...INITIAL_STATE.hiddenSlots,   ...(parsed.hiddenSlots   || {}) },
      extraPlan:     { ...INITIAL_STATE.extraPlan,     ...(parsed.extraPlan     || {}) },
      detailedSets:  { ...INITIAL_STATE.detailedSets,  ...(parsed.detailedSets  || {}) },
      customPlan:    parsed.customPlan    || { days:[] },
      extraDays:     { ...INITIAL_STATE.extraDays,     ...(parsed.extraDays     || {}) },
      detailedMode:  parsed.detailedMode  || false,
      theme:         parsed.theme         || 'paper',
      isPro:         parsed.isPro         || false,
      planType:      parsed.planType      || (parsed.isPro ? 'yearly' : 'free'),
      weekHistory:   parsed.weekHistory   || [],
      bodyLog:       parsed.bodyLog       || [],
      user:          parsed.user           || null,
      measurements:  parsed.measurements  || {},
    };
  } catch { return INITIAL_STATE; }
}

function reducer(state, action) {
  const split = action.split || state.activeSplit;
  const sc = state.completions[split] || [];
  const sd = state.completedDays[split] || [];
  const ss = state.setsLog[split] || {};
  const sh = state.hiddenSlots[split] || {};

  switch(action.type) {
    case "SET_SPLIT":
      return { ...state, activeSplit: action.split };

    case "TOGGLE_DETAILED":
      return { ...state, detailedMode: !state.detailedMode };

    case "TOGGLE_THEME":
      return { ...state, theme: state.theme === 'ink' ? 'paper' : 'ink' };

    case "ADD_SET_ENTRY": {
      const ds = state.detailedSets || {};
      const splitDs = ds[split] || {};
      const key = `${action.day}_${action.slot}`;
      return { ...state, detailedSets: { ...ds, [split]: { ...splitDs, [key]: [...(splitDs[key]||[]), { reps:action.reps, kg:action.kg }] } } };
    }
    case "EDIT_SET_ENTRY": {
      const ds = state.detailedSets || {};
      const splitDs = ds[split] || {};
      const key = `${action.day}_${action.slot}`;
      const entries = [...(splitDs[key]||[])];
      entries[action.index] = { reps:action.reps, kg:action.kg };
      return { ...state, detailedSets: { ...ds, [split]: { ...splitDs, [key]: entries } } };
    }
    case "DELETE_SET_ENTRY": {
      const ds = state.detailedSets || {};
      const splitDs = ds[split] || {};
      const key = `${action.day}_${action.slot}`;
      const entries = (splitDs[key]||[]).filter((_,i) => i !== action.index);
      return { ...state, detailedSets: { ...ds, [split]: { ...splitDs, [key]: entries } } };
    }

    case "CHECK":
      if (sc.some(c=>c.day===action.day && c.slot===action.slot)) return state;
      return { ...state, completions: { ...state.completions, [split]:[...sc,{day:action.day,slot:action.slot,id:action.id}] }};

    case "UNCHECK":
      return { ...state, completions: { ...state.completions, [split]:sc.filter(c=>!(c.day===action.day&&c.slot===action.slot)) }};

    case "ADD_EXTRA": {
      const ep = (state.extraPlan||{})[split]||{};
      const dayExtras = ep[action.day]||[];
      if (dayExtras.some(e=>e.id===action.id)) return state;
      const usedSlots = dayExtras.map(e=>e.slot);
      let slot=1000; while(usedSlots.includes(slot)) slot++;
      return { ...state, extraPlan: { ...(state.extraPlan||{}), [split]: { ...ep, [action.day]: [...dayExtras,{slot,id:action.id}] } } };
    }
    case "REMOVE_EXTRA": {
      const ep = (state.extraPlan||{})[split]||{};
      const dayExtras = (ep[action.day]||[]).filter(e=>e.slot!==action.slot);
      return { ...state,
        extraPlan: { ...(state.extraPlan||{}), [split]: { ...ep, [action.day]: dayExtras } },
        completions: { ...state.completions, [split]: sc.filter(c=>!(c.day===action.day&&c.slot===action.slot)) },
      };
    }
    case "REMOVE_EXTRA_BY_ID": {
      const ep = (state.extraPlan||{})[split]||{};
      const dayExtras = ep[action.day]||[];
      const removed = dayExtras.find(e=>e.id===action.id);
      if (!removed) return state;
      return { ...state,
        extraPlan: { ...(state.extraPlan||{}), [split]: { ...ep, [action.day]: dayExtras.filter(e=>e.id!==action.id) } },
        completions: { ...state.completions, [split]: sc.filter(c=>!(c.day===action.day&&c.slot===removed.slot)) },
      };
    }
    case "UPDATE_MEASUREMENT":
      return { ...state, measurements: { ...(state.measurements||{}), [action.key]: action.value } };
    case "ADD_EXTRA_DAY":
      return { ...state, extraDays: { ...(state.extraDays||{}), [action.split||split]: { enabled:true, title:action.title||"Extra Day" } } };
    case "REMOVE_EXTRA_DAY":
      return { ...state, extraDays: { ...(state.extraDays||{}), [action.split||split]: null } };

    case "ADD_SET": {
      const key = `${action.day}_${action.slot}`;
      const cur = ss[key] || 0;
      const next = cur >= action.target ? 0 : cur + 1;
      return { ...state, setsLog: { ...state.setsLog, [split]: { ...ss, [key]: next } } };
    }

    case "HIDE_SLOT": {
      const dayHidden = sh[action.day] || [];
      if (dayHidden.includes(action.slot)) return state;
      return { ...state, hiddenSlots: { ...state.hiddenSlots, [split]: { ...sh, [action.day]: [...dayHidden, action.slot] } } };
    }

    case "SHOW_SLOT": {
      const dayHidden = sh[action.day] || [];
      return { ...state, hiddenSlots: { ...state.hiddenSlots, [split]: { ...sh, [action.day]: dayHidden.filter(s=>s!==action.slot) } } };
    }

    case "UPGRADE_PRO":
      return { ...state, isPro: true, planType: state.planType==='free' ? 'yearly' : state.planType };
    case "SET_PLAN":
      return { ...state, isPro: action.planType !== 'free', planType: action.planType };

    case "SET_USER":
      return { ...state, user: action.user };
    case "LOAD_CLOUD": {
      const { profile = {}, training = {} } = action;
      const activeSplit = SPLITS[training.activeSplit] ? training.activeSplit : 'pushPull';
      return {
        ...INITIAL_STATE,
        theme: state.theme,
        activeSplit,
        completions:   training.completions   || INITIAL_STATE.completions,
        completedDays: training.completedDays || INITIAL_STATE.completedDays,
        setsLog:       training.setsLog       || INITIAL_STATE.setsLog,
        hiddenSlots:   training.hiddenSlots   || INITIAL_STATE.hiddenSlots,
        extraPlan:     training.extraPlan     || INITIAL_STATE.extraPlan,
        detailedSets:  training.detailedSets  || INITIAL_STATE.detailedSets,
        customPlan:    training.customPlan    || { days:[] },
        extraDays:     training.extraDays     || INITIAL_STATE.extraDays,
        weekHistory:   training.weekHistory   || [],
        bodyLog:       training.bodyLog       || [],
        measurements:  training.measurements  || {},
        isPro:         training.isPro         || false,
        planType:      training.planType      || 'free',
        detailedMode:  training.detailedMode  || false,
        user:          profile,
      };
    }
    case "SIGN_OUT":
      return { ...INITIAL_STATE, theme: state.theme };

    case "LOG_BODY_WEIGHT": {
      const entry = { date: Date.now(), kg: action.kg };
      return { ...state, bodyLog: [...(state.bodyLog||[]), entry] };
    }

    case "COMPLETE_DAY": {
      const days = sd.includes(action.day) ? sd : [...sd, action.day];
      const splitDays = split === 'custom' ? (state.customPlan?.days||[]) : (SPLITS[split]?.days||[]);
      const newCompletedDays = { ...state.completedDays, [split]:days };
      return { ...state, completedDays: newCompletedDays };
    }

    case "COMPLETE_WEEK": {
      const ds = (state.detailedSets||{})[split] || {};
      const weekEntry = { id: Date.now(), split, completedAt: Date.now(), completions: [...sc], setsLog: { ...ss }, detailedSets: { ...ds } };
      return { ...state,
        completions:   { ...state.completions,   [split]:[] },
        completedDays: { ...state.completedDays, [split]:[] },
        setsLog:       { ...state.setsLog,       [split]:{} },
        hiddenSlots:   { ...state.hiddenSlots,   [split]:{} },
        extraPlan:     { ...(state.extraPlan||{}), [split]:{} },
        detailedSets:  { ...(state.detailedSets||{}), [split]:{} },
        weekHistory:   [...(state.weekHistory||[]), weekEntry],
      };
    }

    case "RESET_DAY": {
      const newSets = { ...ss };
      Object.keys(newSets).forEach(k => { if (k.startsWith(`${action.day}_`)) delete newSets[k]; });
      const newHidden = { ...sh }; delete newHidden[action.day];
      const newEP = { ...((state.extraPlan||{})[split]||{}) }; delete newEP[action.day];
      const newDs = { ...((state.detailedSets||{})[split]||{}) };
      Object.keys(newDs).forEach(k => { if (k.startsWith(`${action.day}_`)) delete newDs[k]; });
      return { ...state,
        completions:   { ...state.completions,   [split]:sc.filter(c=>c.day!==action.day) },
        completedDays: { ...state.completedDays, [split]:sd.filter(d=>d!==action.day) },
        setsLog:       { ...state.setsLog,       [split]:newSets },
        hiddenSlots:   { ...state.hiddenSlots,   [split]:newHidden },
        extraPlan:     { ...(state.extraPlan||{}), [split]:newEP },
        detailedSets:  { ...(state.detailedSets||{}), [split]:newDs },
      };
    }

    case "RESET_SPLIT":
      return { ...state,
        completions:   { ...state.completions,   [split]:[] },
        completedDays: { ...state.completedDays, [split]:[] },
        setsLog:       { ...state.setsLog,       [split]:{} },
        hiddenSlots:   { ...state.hiddenSlots,   [split]:{} },
        extraPlan:     { ...(state.extraPlan||{}), [split]:{} },
        detailedSets:  { ...(state.detailedSets||{}), [split]:{} },
      };

    case "ADD_CUSTOM_DAY": {
      const newDays = [...(state.customPlan?.days||[]), { title:action.title, sub:"", main:[], other:[] }];
      return { ...state, customPlan: { ...state.customPlan, days:newDays } };
    }

    case "REMOVE_CUSTOM_DAY": {
      const newDays = (state.customPlan?.days||[]).filter((_,i)=>i!==action.index);
      return { ...state, customPlan: { ...state.customPlan, days:newDays } };
    }

    case "RENAME_CUSTOM_DAY": {
      const newDays = (state.customPlan?.days||[]).map((d,i)=>i===action.index?{...d,title:action.title}:d);
      return { ...state, customPlan: { ...state.customPlan, days:newDays } };
    }

    default: return state;
  }
}

function App() {
  const isStandalone = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone===true;
  const [state, dispatch] = useReducer(reducer, null, loadState);
  useEffectApp(() => { localStorage.setItem("tl-state", JSON.stringify(state)); }, [state]);

  // Restore Supabase session on mount
  useEffectApp(() => {
    sb.auth.getSession().then(({ data: { session } }) => {
      if (!session) return;
      if (state.user) return; // already loaded from localStorage
      sb.from('user_data').select('profile,training').eq('user_id', session.user.id).maybeSingle().then(({ data: ud }) => {
        if (ud?.training) dispatch({ type:'LOAD_CLOUD', profile: ud.profile || {}, training: ud.training });
        else dispatch({ type:'SET_USER', user:{ email: session.user.email, ...(session.user.user_metadata || {}) } });
      });
    });
    // Keep local state in sync when auth changes (e.g. email confirmation)
    const { data: { subscription } } = sb.auth.onAuthStateChange((_event, session) => {
      if (_event === 'SIGNED_OUT') dispatch({ type:'SIGN_OUT' });
    });
    return () => subscription.unsubscribe();
  }, []);

  // Debounced cloud sync on state change
  const syncTimer = useRefApp(null);
  useEffectApp(() => {
    if (!state.user) return;
    clearTimeout(syncTimer.current);
    syncTimer.current = setTimeout(async () => {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) return;
      const { user, theme, ...training } = state;
      const profile = { email: user?.email, name: user?.name, goal: user?.goal, experience: user?.experience, daysPerWeek: user?.daysPerWeek };
      await sb.from('user_data').upsert({ user_id: session.user.id, profile, training, updated_at: new Date().toISOString() }, { onConflict: 'user_id' }).catch(() => {});
    }, 2000);
  }, [state]);

  const handleSignOut = async () => {
    await sb.auth.signOut();
    dispatch({ type:'SIGN_OUT' });
  };


  const [route, setRoute] = useStateApp(() => {
    try { const s=localStorage.getItem("tl-route"); if(s) return JSON.parse(s); } catch {}
    return { screen:"home" };
  });
  useEffectApp(() => { localStorage.setItem("tl-route", JSON.stringify(route)); }, [route]);

  const [tweaks, setTweaks] = useStateApp({ accent:"vermilion", typePair:"serif-geist" });
  const [tweaksOn, setTweaksOn] = useStateApp(false);
  useEffectApp(() => {
    const ALLOWED_ORIGIN = window.location.origin;
    const h = e => {
      if (e.origin !== ALLOWED_ORIGIN && e.origin !== 'null') return;
      if(e.data?.type==="__activate_edit_mode") setTweaksOn(true);
      if(e.data?.type==="__deactivate_edit_mode") setTweaksOn(false);
    };
    window.addEventListener("message",h);
    try { window.parent.postMessage({type:"__edit_mode_available"}, ALLOWED_ORIGIN); } catch(_) {}
    return () => window.removeEventListener("message",h);
  },[]);

  const variant = state.theme || 'paper';
  const v = VARIANTS[variant] || VARIANTS.paper;
  const p = TYPE_PAIRS[tweaks.typePair]||TYPE_PAIRS["serif-geist"];
  const cssVars = {
    "--paper":v.paper,"--ink":v.ink,"--ink-60":v.ink60,"--ink-30":v.ink30,
    "--rule":v.rule,"--accent":ACCENT_CHOICES[tweaks.accent]||ACCENT_CHOICES.vermilion,
    "--accent-tint":v.accentTint,"--success":"oklch(0.52 0.12 150)",
    "--font-display":p.display,"--font-body":p.body,"--font-mono":p.mono,
    "--current-muted": variant==="ink" ? "rgba(0,0,0,0.45)" : "rgba(255,255,255,0.6)",
    "--current-track":  variant==="ink" ? "rgba(0,0,0,0.12)" : "rgba(255,255,255,0.18)",
  };

  const [showPaywall, setShowPaywall] = useStateApp(false);
  const navigate = r => setRoute(r);

  const BottomNav = () => {
    const tabs = [
      { id:"home",      label:"Train",     icon:<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="2" y="9" width="16" height="2.5" rx="1.25" fill="currentColor"/><rect x="5" y="5.5" width="2.5" height="9" rx="1.25" fill="currentColor"/><rect x="12.5" y="5.5" width="2.5" height="9" rx="1.25" fill="currentColor"/></svg> },
      { id:"analytics", label:"Analytics", icon:<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="3" y="12" width="3" height="5" rx="1" fill="currentColor"/><rect x="8.5" y="8" width="3" height="9" rx="1" fill="currentColor"/><rect x="14" y="4" width="3" height="13" rx="1" fill="currentColor"/></svg> },
      { id:"profile",   label:"Profile",   icon:<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="7" r="3.5" stroke="currentColor" strokeWidth="1.6"/><path d="M3 18c0-3.9 3.1-7 7-7s7 3.1 7 7" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"/></svg> },
    ];
    return (
      <div style={{ position:"fixed", bottom:0, left:0, right:0, zIndex:100, background:"var(--paper)", borderTop:"1px solid var(--rule)", display:"flex", paddingBottom:"env(safe-area-inset-bottom)" }}>
        {tabs.map(t => {
          const active = route.screen===t.id || (t.id==="home" && route.screen==="day");
          return (
            <button key={t.id} onClick={() => navigate({ screen:t.id })}
              style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:4, padding:"10px 0 8px", background:"transparent", border:"none", cursor:"pointer", color:active?"var(--ink)":"var(--ink-60)", transition:"color 160ms" }}>
              {t.icon}
              <span style={{ fontFamily:"var(--font-mono)", fontSize:9, letterSpacing:0.18, textTransform:"uppercase" }}>{t.label}</span>
            </button>
          );
        })}
      </div>
    );
  };

  const renderScreen = () => {
    if (route.screen==="day")       return <DayScreen state={state} dispatch={dispatch} navigate={navigate} dayId={route.dayId} isPro={state.isPro} setShowPaywall={setShowPaywall}/>;
    if (route.screen==="analytics") return <AnalyticsScreen state={state} dispatch={dispatch} navigate={navigate} setShowPaywall={setShowPaywall}/>;
    if (route.screen==="profile")   return <ProfileScreen state={state} dispatch={dispatch} navigate={navigate} onSignOut={handleSignOut}/>;
    if (route.screen==="auth")      return <AuthScreen state={state} dispatch={dispatch} navigate={navigate}/>;
    return <Dashboard state={state} dispatch={dispatch} navigate={navigate} setShowPaywall={setShowPaywall}/>;
  };

  if (isStandalone) {
    return (
      <div style={{ minHeight:"100vh", background:"var(--paper)", color:"var(--ink)", paddingTop:"env(safe-area-inset-top)", ...cssVars }}>
        <div style={{ paddingTop:12 }}>{renderScreen()}</div>
        <BottomNav/>
        {showPaywall && <PaywallModal onClose={()=>setShowPaywall(false)}/>}
      </div>
    );
  }

  return (
    <div style={{
      minHeight:"100vh",
      background: variant==="ink"
        ? "radial-gradient(ellipse at top,oklch(0.22 0.01 260),oklch(0.12 0.01 260))"
        : "radial-gradient(ellipse at top,oklch(0.93 0.01 80),oklch(0.86 0.015 70))",
      display:"flex", alignItems:"center", justifyContent:"center", padding:"40px 20px", ...cssVars,
    }}>
      <IOSDevice width={390} height={844} dark={variant==="ink"}>
        <div style={{ minHeight:"100%", background:"var(--paper)", color:"var(--ink)", paddingTop:54, position:"relative" }}>
          {renderScreen()}
          <BottomNav/>
          {showPaywall && <PaywallModal onClose={()=>setShowPaywall(false)}/>}
        </div>
      </IOSDevice>
      {!tweaksOn && <div style={{ position:"fixed", bottom:20, left:20, fontFamily:"ui-monospace,monospace", fontSize:10, letterSpacing:0.14, textTransform:"uppercase", color:"var(--ink-30)", pointerEvents:"none" }}>Training Log</div>}
    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(p) { super(p); this.state = { err: null }; }
  static getDerivedStateFromError(err) { return { err }; }
  render() {
    if (this.state.err) return (
      <div style={{ padding:32, fontFamily:'system-ui', textAlign:'center' }}>
        <div style={{ fontSize:22, fontWeight:600, marginBottom:12 }}>Something went wrong</div>
        <div style={{ fontSize:13, color:'#666', marginBottom:24 }}>{String(this.state.err)}</div>
        <button onClick={()=>this.setState({err:null})} style={{ padding:'10px 24px', background:'#111', color:'#fff', border:'none', cursor:'pointer', fontSize:13 }}>Try Again</button>
      </div>
    );
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App /></ErrorBoundary>);
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}
</script>

</body>
</html>
